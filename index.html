<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
canvas.width = 320;
canvas.height = 240;
const CANVAS_W = 320, CANVAS_H = 240, TILE_SIZE = 16;
const DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

const PALETTE = {
  black: '#000000',
  white: '#ffffff',
  grass: '#00a800',
  grass2: '#006800',
  green3: '#004800',
  floorWood: '#c08840',
  floorWood2: '#a07030',
  stone2: '#888888',
  stone3: '#404040',
  wood: '#b86010',
  wood2: '#803800',
  wood3: '#503000',
  red: '#e40058',
  red2: '#a80000',
  orange: '#f87858',
  orange2: '#c84010',
  yellow: '#f8e800',
  yellow2: '#c8b400',
  green2: '#007800',
  teal2: '#00a0a0',
  teal3: '#006868',
  blue: '#3060f8',
  blue2: '#0030c0',
  brown3: '#402000',
  cream: '#f8d8a0',
  skin: '#f0b870',
  skin2: '#c87840',
  windowBlue: '#5888f8',
  windowYellow: '#f8e840',
  roofRed: '#c81010',
  roofDark: '#800000',
  chimney: '#606060',
  metalDark: '#404858',
  metalMid: '#586070',
  metalLight: '#788898',
  brickRed: '#b84030',
  brickDark: '#883020',
  brickMortar: '#c09080',
  wallLight: '#d8c8b0',
  wallMid: '#b0a090',
  wallDark: '#887868',
  bedBlue: '#4060c0',
  bedWhite: '#e8e8f0',
  bedPillow: '#f0f0ff',
  tableColor: '#b06820',
  plantGreen: '#20a820',
  potBrown: '#904820',
  factFloor: '#585848',
  factWall: '#484840',
  factAccent: '#787860',
  factMachine1: '#405870',
  factMachine2: '#304860',
  factMachineLight: '#00e8a0',
  factConveyor: '#888878',
  factConveyor2: '#606050',
  streetGray: '#909090',
  streetLine: '#f8f800',
  streetDark: '#707070',
  sidewalk: '#c0b898',
  sidewalkEdge: '#a09070',
  parkGrass: '#20b020',
  parkGrass2: '#108010',
  treeTop: '#188018',
  treeTrunk: '#805020',
  neonCyan: '#00ffff',
  neonGreen: '#00ff00',
  neonPink: '#ff00ff',
};

// ── TOWN LEVEL DEFINITIONS ───────────────────────────────────────────
const TOWN_LEVELS = [
  { lv: 1, name: 'Hamlet',     unlocks: null,               flavor: 'A quiet hamlet — home, diner, shop and park.' },
  { lv: 2, name: 'Village',    unlocks: 'Library',          flavor: 'A library opens its doors, bringing knowledge to all.' },
  { lv: 3, name: 'Small Town', unlocks: 'Clinic',           flavor: 'The clinic opens, keeping every resident healthy.' },
  { lv: 4, name: 'Town',       unlocks: 'Market',           flavor: 'A bustling market brings bulk deals and new trade.' },
  { lv: 5, name: 'City',       unlocks: 'Community Center', flavor: 'The Community Center rises — the heart of the city!' },
];

const spriteCache = {};
function makeSpr(key, w, h, fn) {
  const oc = document.createElement('canvas');
  oc.width = w;
  oc.height = h;
  const ox = oc.getContext('2d');
  fn(ox);
  spriteCache[key] = oc;
}

function drawBrick(ox, c1, c2, c3, W2, H2) {
  W2 = W2 || TILE_SIZE;
  H2 = H2 || TILE_SIZE;
  ox.fillStyle = c1;
  ox.fillRect(0, 0, W2, H2);
  for (let r = 0; r < H2; r += 4) {
    const off = (Math.floor(r / 4) % 2) * 8;
    for (let c = 0; c < W2; c += 8) {
      ox.fillStyle = c2;
      ox.fillRect((c + off) % W2, r, 7, 3);
    }
  }
  ox.fillStyle = c3;
  for (let r = 0; r < H2; r += 4) ox.fillRect(0, r, W2, 1);
  for (let c = 0; c < W2; c += 8) {
    ox.fillRect(c, 0, 1, H2);
    ox.fillRect((c + 8) % W2, 4, 1, 4);
  }
}

function drawWoodFloor(ox, c1, c2) {
  ox.fillStyle = c1;
  ox.fillRect(0, 0, TILE_SIZE, TILE_SIZE);
  ox.fillStyle = c2;
  for (let i = 0; i < TILE_SIZE; i += 4) ox.fillRect(0, i, TILE_SIZE, 1);
  ox.fillStyle = 'rgba(255,255,255,0.07)';
  for (let i = 2; i < TILE_SIZE; i += 4) ox.fillRect(0, i, TILE_SIZE, 1);
}

function drawGrass(ox) {
  ox.fillStyle = PALETTE.grass;
  ox.fillRect(0, 0, TILE_SIZE, TILE_SIZE);
  ox.fillStyle = PALETTE.grass2;
  for (let i = 0; i < 6; i++) {
    const x = (i * 5) % TILE_SIZE;
    const y = (i * 3) % TILE_SIZE;
    ox.fillRect(x, y, 2, 1);
    ox.fillRect(x + 1, y - 1, 1, 1);
  }
  ox.fillStyle = PALETTE.green3;
  for (let i = 0; i < 3; i++) {
    const x = (i * 7 + 2) % TILE_SIZE;
    const y = (i * 5 + 4) % TILE_SIZE;
    ox.fillRect(x, y, 1, 1);
  }
}

function drawStreet(ox) {
  ox.fillStyle = PALETTE.streetDark;
  ox.fillRect(0, 0, TILE_SIZE, TILE_SIZE);
  for (let i = 0; i < TILE_SIZE; i += 2) {
    ox.fillStyle = i % 4 === 0 ? PALETTE.streetGray : PALETTE.streetDark;
    ox.fillRect(0, i, TILE_SIZE, 1);
  }
}

function drawSidewalk(ox) {
  ox.fillStyle = PALETTE.sidewalk;
  ox.fillRect(0, 0, TILE_SIZE, TILE_SIZE);
  ox.fillStyle = PALETTE.sidewalkEdge;
  ox.fillRect(0, 0, TILE_SIZE, 1);
  ox.fillRect(0, TILE_SIZE - 1, TILE_SIZE, 1);
  ox.fillRect(0, 0, 1, TILE_SIZE);
  ox.fillRect(TILE_SIZE - 1, 0, 1, TILE_SIZE);
  ox.fillStyle = 'rgba(0,0,0,0.1)';
  ox.fillRect(TILE_SIZE / 2, 0, 1, TILE_SIZE);
  ox.fillRect(0, TILE_SIZE / 2, TILE_SIZE, 1);
}

function drawFactoryFloor(ox) {
  ox.fillStyle = PALETTE.factFloor;
  ox.fillRect(0, 0, TILE_SIZE, TILE_SIZE);
  ox.fillStyle = PALETTE.factAccent;
  for (let r = 0; r < TILE_SIZE; r += 8) {
    for (let c = 0; c < TILE_SIZE; c += 8) {
      ox.fillRect(c, r, 8, 1);
      ox.fillRect(c, r, 1, 8);
    }
  }
  ox.fillStyle = 'rgba(0,0,0,0.2)';
  ox.fillRect(0, TILE_SIZE - 1, TILE_SIZE, 1);
  ox.fillRect(TILE_SIZE - 1, 0, 1, TILE_SIZE);
}

makeSpr('house', 48, 48, ox => {
  ox.fillStyle = PALETTE.brickRed;
  ox.fillRect(0, 16, 48, 32);
  drawBrick(ox, PALETTE.brickRed, PALETTE.brickDark, PALETTE.brickMortar, 48, 32);
  ox.fillStyle = PALETTE.roofRed;
  for (let i = 0; i <= 16; i++) ox.fillRect(i, 16 - i, 48 - i * 2, 1);
  ox.fillStyle = PALETTE.roofDark;
  for (let i = 0; i <= 16; i += 4) ox.fillRect(i, 16 - i, 48 - i * 2, 1);
  ox.fillStyle = PALETTE.chimney;
  ox.fillRect(34, 4, 6, 14);
  ox.fillStyle = PALETTE.stone3;
  ox.fillRect(33, 4, 1, 14);
  ox.fillRect(33, 4, 8, 2);
  ox.fillStyle = PALETTE.wood2;
  ox.fillRect(17, 34, 14, 14);
  ox.fillStyle = PALETTE.wood3;
  ox.fillRect(17, 34, 1, 14);
  ox.fillRect(17, 34, 14, 1);
  ox.fillStyle = PALETTE.yellow2;
  ox.fillRect(28, 41, 2, 2);
  [8, 30].forEach(wx => {
    ox.fillStyle = PALETTE.windowBlue;
    ox.fillRect(wx, 22, 10, 10);
    ox.fillStyle = PALETTE.white;
    ox.fillRect(wx, 22, 10, 1);
    ox.fillRect(wx, 22, 1, 10);
    ox.fillStyle = PALETTE.windowYellow;
    ox.fillRect(wx + 2, 24, 3, 3);
    ox.fillRect(wx + 6, 24, 3, 3);
    ox.fillStyle = PALETTE.stone3;
    ox.fillRect(wx - 1, 21, 12, 1);
    ox.fillRect(wx - 1, 32, 12, 1);
  });
});

makeSpr('factory', 80, 64, ox => {
  ox.fillStyle = PALETTE.factWall || '#484840';
  ox.fillRect(0, 16, 80, 48);
  for (let r = 16; r < 64; r += 6) {
    for (let c = 0; c < 80; c += 12) {
      const off = (Math.floor(r / 6) % 2) * 6;
      ox.fillStyle = PALETTE.metalDark;
      ox.fillRect((c + off) % 80, r, 11, 5);
      ox.fillStyle = PALETTE.metalMid;
      ox.fillRect((c + off) % 80, r, 1, 6);
      ox.fillRect((c + off) % 80, r, 11, 1);
    }
  }
  ox.fillStyle = PALETTE.metalDark;
  ox.fillRect(0, 12, 80, 6);
  ox.fillStyle = PALETTE.metalLight;
  ox.fillRect(0, 12, 80, 2);
  [10, 30, 50].forEach(sx => {
    ox.fillStyle = PALETTE.chimney;
    ox.fillRect(sx, 0, 8, 18);
    ox.fillStyle = PALETTE.stone3;
    ox.fillRect(sx, 0, 1, 18);
    ox.fillRect(sx, 0, 8, 2);
    ox.fillRect(sx, 16, 10, 2);
    ox.fillStyle = 'rgba(168,168,168,0.6)';
    ox.fillRect(sx + 1, -3, 6, 4);
  });
  [[4, 22], [20, 22], [36, 22], [52, 22], [68, 22]].forEach(([wx, wy]) => {
    ox.fillStyle = PALETTE.windowBlue;
    ox.fillRect(wx, wy, 8, 12);
    ox.fillStyle = PALETTE.neonCyan;
    ox.fillRect(wx + 1, wy + 1, 6, 1);
    ox.fillStyle = PALETTE.white;
    ox.fillRect(wx, wy, 8, 1);
    ox.fillRect(wx, wy, 1, 12);
  });
  ox.fillStyle = PALETTE.metalMid;
  ox.fillRect(28, 42, 24, 22);
  ox.fillStyle = PALETTE.metalDark;
  ox.fillRect(28, 42, 1, 22);
  ox.fillRect(28, 42, 24, 1);
  for (let i = 0; i < 24; i += 4) {
    ox.fillStyle = i % 8 < 4 ? PALETTE.yellow : '#111';
    ox.fillRect(28 + i, 42, 4, 3);
  }
});

makeSpr('diner', 48, 48, ox => {
  ox.fillStyle = PALETTE.orange;
  ox.fillRect(0, 16, 48, 32);
  for (let r = 16; r < 48; r += 4) {
    ox.fillStyle = r % 8 === 0 ? PALETTE.orange : PALETTE.orange2;
    ox.fillRect(0, r, 48, 4);
  }
  for (let i = 0; i < 48; i += 6) {
    ox.fillStyle = i % 12 < 6 ? PALETTE.red2 : '#eee';
    ox.fillRect(i, 14, 6, 6);
  }
  ox.fillStyle = PALETTE.red2;
  ox.fillRect(0, 14, 48, 2);
  ox.fillStyle = PALETTE.red;
  ox.fillRect(0, 10, 48, 6);
  ox.fillStyle = PALETTE.red2;
  ox.fillRect(0, 10, 48, 2);
  ox.fillStyle = PALETTE.neonPink;
  ox.fillRect(6, 2, 36, 8);
  ox.fillStyle = '#000';
  ox.font = 'bold 5px monospace';
  ox.fillText('DINER', 10, 8);
  ox.fillStyle = PALETTE.neonCyan;
  ox.fillRect(6, 2, 36, 1);
  ox.fillRect(6, 9, 36, 1);
  [4, 28].forEach(wx => {
    ox.fillStyle = PALETTE.windowBlue;
    ox.fillRect(wx, 20, 14, 12);
    ox.fillStyle = PALETTE.yellow;
    ox.fillRect(wx + 2, 22, 4, 4);
    ox.fillRect(wx + 8, 22, 4, 4);
    ox.fillStyle = PALETTE.white;
    ox.fillRect(wx, 20, 14, 1);
    ox.fillRect(wx, 20, 1, 12);
  });
  ox.fillStyle = PALETTE.wood2;
  ox.fillRect(17, 34, 14, 14);
  ox.fillStyle = PALETTE.yellow2;
  ox.fillRect(27, 41, 2, 2);
});

makeSpr('shop', 32, 48, ox => {
  ox.fillStyle = PALETTE.blue2;
  ox.fillRect(0, 16, 32, 32);
  for (let r = 16; r < 48; r += 4) {
    ox.fillStyle = r % 8 === 0 ? '#2244a8' : '#1a3488';
    ox.fillRect(0, r, 32, 4);
  }
  ox.fillStyle = PALETTE.blue;
  ox.fillRect(0, 10, 32, 8);
  ox.fillStyle = PALETTE.blue2;
  ox.fillRect(0, 10, 32, 2);
  ox.fillStyle = PALETTE.yellow;
  ox.fillRect(4, 2, 24, 8);
  ox.fillStyle = '#111';
  ox.font = 'bold 5px monospace';

  ox.fillRect(14, 22, 6, 6);

  ox.fillRect(19, 42, 2, 2);
});

  ox.fillStyle = PALETTE.wallLight;
  ox.fillRect(0, 24, 64, 40);
  for (let r = 24; r < 64; r += 4) {
    for (let c = 0; c < 64; c += 8) {
      const off = (Math.floor(r / 4) % 2) * 4;
      ox.fillStyle = PALETTE.wallMid;
      ox.fillRect((c + off) % 64, r, 7, 3);
      ox.fillStyle = PALETTE.wallDark;
      ox.fillRect((c + off) % 64, r, 1, 4);

  [8, 24, 40, 56].forEach(cx => {
    ox.fillStyle = PALETTE.white;
    ox.fillRect(cx, 20, 4, 44);
    ox.fillStyle = PALETTE.wallDark;
    ox.fillRect(cx, 20, 1, 44);
  });
  for (let i = 0; i <= 24; i++) {
    ox.fillStyle = PALETTE.wallLight;
    ox.fillRect(i, 24 - i, 64 - i * 2, 2);
    ox.fillStyle = PALETTE.wallMid;
    ox.fillRect(i, 24 - i, 1, 2);
  }
  ox.fillStyle = PALETTE.green2;
  for (let r = 0; r < 8; r++) ox.fillRect(24 + r / 2, r, 64 - 24 - r, 2);
  ox.fillStyle = PALETTE.stone3;
  ox.fillRect(31, -4, 1, 6);
  ox.fillStyle = PALETTE.red;
  ox.fillRect(32, -4, 4, 3);
  [4, 44].forEach(wx => {
    ox.fillStyle = PALETTE.windowBlue;
    ox.fillRect(wx, 28, 10, 10);
    ox.fillStyle = PALETTE.white;
    ox.fillRect(wx, 28, 10, 1);
    ox.fillRect(wx, 28, 1, 10);
    ox.fillStyle = PALETTE.windowYellow;
    ox.fillRect(wx + 2, 30, 3, 3);
    ox.fillRect(wx + 6, 30, 3, 3);
  });
  ox.fillStyle = PALETTE.wood2;
  ox.fillRect(22, 46, 20, 18);
  ox.fillStyle = PALETTE.yellow2;
  ox.fillRect(38, 55, 2, 2);
});

makeSpr('tree', 24, 32, ox => {
  ox.fillStyle = PALETTE.treeTrunk;
  ox.fillRect(9, 20, 6, 12);
  ox.fillStyle = PALETTE.brown3;

function makePlayer(key, frame, facing, clothed, uniform) {
  makeSpr(key, 8, 16, ox => {
    ox.fillStyle = 'rgba(0,0,0,0.2)';
    ox.fillRect(1, 13, 6, 2);
    ox.fillStyle = clothed ? PALETTE.blue2 : PALETTE.skin2;
    if (frame === 0) {
      ox.fillRect(1, 10, 2, 4);
      ox.fillRect(4, 10, 2, 4);
    } else {
      ox.fillRect(1, 9, 2, 5);
      ox.fillRect(4, 11, 2, 3);
    }
    ox.fillStyle = '#111';
    ox.fillRect(1, 14, 2, 2);
    ox.fillRect(4, 14, 2, 2);
    ox.fillStyle = clothed ? (uniform ? '#2277aa' : '#2244aa') : PALETTE.skin;
    ox.fillRect(0, 4, 8, 7);
    ox.fillStyle = clothed ? (uniform ? '#1a5588' : '#1a3388') : PALETTE.skin2;
    if (facing === 1) {
      ox.fillRect(7, 5, 2, 3);
    } else if (facing === 3) {
      ox.fillRect(-1, 5, 2, 3);
    } else {
      ox.fillRect(-1, 5, 2, 3);
      ox.fillRect(7, 5, 2, 3);
    }
    ox.fillStyle = PALETTE.skin;
    ox.fillRect(1, 0, 6, 4);
    ox.fillStyle = '#443322';
    ox.fillRect(1, 0, 6, 2);
    ox.fillRect(1, 0, 1, 3);
    ox.fillRect(6, 0, 1, 3);
    ox.fillStyle = '#111';
    if (facing === 2) {
      ox.fillRect(2, 2, 1, 1);
      ox.fillRect(5, 2, 1, 1);
    } else if (facing === 0) {
      ox.fillRect(2, 1, 1, 1);
      ox.fillRect(5, 1, 1, 1);
    } else if (facing === 1) {
      ox.fillRect(6, 1, 1, 2);
    } else {
      ox.fillRect(1, 1, 1, 2);
    }
  });
}

  const m = [];
  for (let r = 0; r < 15; r++) {
    m.push([]);
    for (let c = 0; c < 20; c++) m[r].push(fn(r, c));
  }
  return m;
}

function getTaskDef(taskId) {
  return taskPool.find(t => t.id === taskId) || taskPool[0];
}

function getDailyTaskByIndex(idx) {
  const taskId = gameState.dailyTasks[idx] || taskPool[idx % taskPool.length].id;
  return getTaskDef(taskId);
}

function pickDailyTasks() {
  const ids = taskPool.map(t => t.id);
  for (let i = ids.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [ids[i], ids[j]] = [ids[j], ids[i]];
  }
  return ids.slice(0, 3);
}

function getAssignedTaskIndex(workerId) {
  const idx = [0, 1, 2].find(i => gameState.assignedTasks[i] === workerId);
  return idx === undefined ? -1 : idx;
}

function refreshDailyTaskUI() {
  gameState.taskNames = [0, 1, 2].map(i => getDailyTaskByIndex(i).label);
  for (let i = 0; i < 3; i++) {
    const obj = SCENE_OBJECTS.FACTORY.find(o => o.act === `task${i}`);
    if (obj) obj.lbl = gameState.taskNames[i];
  }
}

function handleDailyTaskCompletion() {
  if (gameState.tasks.every(t => t)) {
    if (new Set(gameState.dailyTasks).size === 3) {
      gameState.diversifiedToday = true;
      checkQuest('diversified');
    }
    log('All 3 tasks done! Head to the Craft Station.', 'g');
    checkQuest('first_day');
  }
}

function completeTaskByIndex(idx, source = 'player') {
  if (gameState.tasks[idx]) return false;
  const task = getDailyTaskByIndex(idx);
  const energyCost = gameState.improvedTools ? Math.floor(task.energy * 0.9) : task.energy;
  if (source === 'player') {
    if (gameState.energy < energyCost) { log('Too tired to do that task right now.', 'w'); return false; }
    gameState.time += task.time;
    gameState.energy = Math.max(0, gameState.energy - energyCost);
  }
  gameState.tasks[idx] = true;
  gameState.factoryXP += task.xp;
  log('Task complete: ' + task.label + ' ✓', 'g');
  checkFactoryLv();
  return true;
}

// tile sprite cache
const tileSpr = {};
function getTile(id) {
  if (!tileSpr[id]) {
    const oc = document.createElement('canvas');
    oc.width = TILE_SIZE;
    oc.height = TILE_SIZE;
    const ox = oc.getContext('2d');
    if (id === 'wall') { drawBrick(ox, '#222244', '#1a1a38', '#2a2a4a'); }
    else if (id === 'floor_wood') drawWoodFloor(ox, PALETTE.floorWood, PALETTE.floorWood2);
    else if (id === 'floor_wood2') drawWoodFloor(ox, '#a07828', '#886020');
    else if (id === 'grass') drawGrass(ox);
    else if (id === 'sidewalk') drawSidewalk(ox);
    else if (id === 'street') drawStreet(ox);
    else if (id === 'factory_wall') { drawBrick(ox, PALETTE.factWall || '#484840', PALETTE.metalDark, PALETTE.metalMid); }
    else if (id === 'factory_floor') drawFactoryFloor(ox);
    tileSpr[id] = oc;
  }
  return tileSpr[id];
}

// ── LABEL DRAWING HELPERS ───────────────────────────────────────────
// Draws text with a solid dark pill background so it's always readable
function drawLabel(text, x, y, opts) {
  opts = opts || {};
  const fsize = opts.size || 6;
  const color = opts.color || '#ffffff';
  const bg = opts.bg || 'rgba(0,0,0,0.82)';
  const border = opts.border || null;
  ctx.save();
  ctx.font = `${fsize}px "Press Start 2P",monospace`;
  const lines = text.split('\n');
  const lh = fsize + 5;
  const maxW = Math.max(...lines.map(l => ctx.measureText(l).width));
  const pad = 4;
  const bw = maxW + pad * 2;
  const bh = lines.length * lh + pad * 2 - 2;
  const bx = x - pad;
  const by = y - fsize - pad + 1;
  // background pill
  ctx.fillStyle = bg;
  ctx.fillRect(bx, by, bw, bh);
  if (border) { ctx.strokeStyle = border; ctx.lineWidth = 1; ctx.strokeRect(bx + .5, by + .5, bw - 1, bh - 1); }
  // text
  ctx.fillStyle = color;
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lh));
  ctx.restore();
}

// Draws a floating sign above a building sprite
function drawBuildingLabel(text, ox, oy, sw) {
  ctx.save();
  const fsize = 6;
  ctx.font = `${fsize}px "Press Start 2P",monospace`;
  const tw = ctx.measureText(text).width;
  const px = ox + sw / 2 - tw / 2 - 4;
  const py = oy - 6;
  // dark background
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(px, py - fsize, tw + 8, fsize + 5);
  ctx.strokeStyle = 'rgba(0,220,180,0.6)';
  ctx.lineWidth = 1;
  ctx.strokeRect(px + .5, py - fsize + .5, tw + 7, fsize + 4);
  ctx.fillStyle = '#00ffcc';
  ctx.fillText(text, px + 4, py);
  ctx.restore();
}

function drawObjects() {
  const objs = SCENE_OBJECTS[gameState.scene];
  for (const o of objs) {
    const taskDone = o.act && o.act.startsWith('task') && gameState.tasks[o.taskIdx || +o.act.slice(4)];
    if (o.spr && spriteCache[o.spr]) {
      const s = spriteCache[o.spr];
      ctx.drawImage(s, o.x, o.y);
      if (taskDone) {
        ctx.fillStyle = 'rgba(0,255,100,0.25)';
        ctx.fillRect(o.x, o.y, s.width, s.height);
      }
      if (o.portal) {
        ctx.strokeStyle = 'rgba(0,255,200,0.45)';
        ctx.lineWidth = 2;
        ctx.strokeRect(o.x + 1, o.y + 1, s.width - 2, s.height - 2);
      }
      // label above sprite
      drawBuildingLabel(o.lbl.split('\n')[0], o.x, o.y, s.width);
    } else {
      ctx.fillStyle = taskDone ? '#1a3311' : o.col || '#555';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      if (o.portal) {
        ctx.strokeStyle = 'rgba(0,255,200,0.6)';
        ctx.lineWidth = 2;
        ctx.strokeRect(o.x + 1, o.y + 1, o.w - 2, o.h - 2);
      } else {
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1;
        ctx.strokeRect(o.x + .5, o.y + .5, o.w - 1, o.h - 1);
      }
      // centered label inside box with dark backing
      const lines = o.lbl.split('\n');
      const fsize = 5;
      ctx.font = `${fsize}px "Press Start 2P",monospace`;
      const lh = fsize + 4;
      const totalH = lines.length * lh;
      const startY = o.y + o.h / 2 - totalH / 2 + fsize;
      lines.forEach((l, i) => {
        const tw = ctx.measureText(l).width;
        const lx = o.x + o.w / 2 - tw / 2;
        const ly = startY + i * lh;
        // shadow stroke for legibility over any background
        ctx.strokeStyle = 'rgba(0,0,0,0.95)';
        ctx.lineWidth = 2;
        ctx.strokeText(l, lx, ly);
        ctx.fillStyle = taskDone ? '#44ff88' : '#ffffff';
        ctx.fillText(l, lx, ly);
      });
      if (taskDone) {
        ctx.save();
        ctx.font = '9px "Press Start 2P",monospace';
        const ckx = o.x + o.w - 11, cky = o.y + 10;
        ctx.strokeStyle = 'rgba(0,0,0,0.95)';
        ctx.lineWidth = 2;
        ctx.strokeText('✓', ckx, cky);
        ctx.fillStyle = '#44ff88';
        ctx.fillText('✓', ckx, cky);
        ctx.restore();
      }
    }
    // task status badge
    if (o.act && o.act.startsWith('task')) {
      const idx = o.taskIdx !== undefined ? o.taskIdx : +o.act.slice(4);
      const done = gameState.tasks[idx];
      const bx = o.x + (o.spr ? spriteCache[o.spr]?.width || o.w : o.w) - 14;
      const by = o.y + 2;
      ctx.fillStyle = done ? '#003300' : '#330000';
      ctx.fillRect(bx, by, 12, 10);
      ctx.strokeStyle = done ? '#44ff88' : '#ff4444';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx + .5, by + .5, 11, 9);
      ctx.font = '6px "Press Start 2P",monospace';
      ctx.fillStyle = done ? '#44ff88' : '#ff4444';
      ctx.fillText(done ? '✓' : '✗', bx + 2, by + 8);
    }
  }
}

function drawNPCs() {
  for (const n of gameState.npcs) {
    if (n.scene !== gameState.scene) continue;
    if (!isNPCUnlocked(n)) continue;
    const s = spriteCache[n.spr];
    if (s) ctx.drawImage(s, n.x, n.y, 16, 32);
    // name tag — always readable
    ctx.save();
    ctx.font = '5px "Press Start 2P",monospace';
    const tw = ctx.measureText(n.name).width;
    const nx2 = n.x + 8 - tw / 2 - 3;
    ctx.fillStyle = 'rgba(0,0,0,0.88)';
    ctx.fillRect(nx2, n.y - 12, tw + 6, 9);
    ctx.strokeStyle = '#ffdd88';
    ctx.lineWidth = .5;
    ctx.strokeRect(nx2 + .5, n.y - 11.5, tw + 5, 8);
    ctx.fillStyle = '#ffee99';
    ctx.fillText(n.name, nx2 + 3, n.y - 5);
    ctx.restore();
    const f = n.friendship || 0;
    if (f >= 1) {
      ctx.font = '8px serif';
      ctx.fillStyle = '#ff88aa';
      for (let i = 0; i < Math.min(f, 3); i++) ctx.fillText('♥', n.x + i * 8, n.y - 14);
    }
  }
}

function drawPlayerSpr() {
  const fr = player.moving ? Math.floor(player.frame / 4) % 2 : 0;
  const key = `pl_${fr}_${player.facing}_${gameState.clothed ? 1 : 0}_${gameState.inventory.uniform ? 1 : 0}`;
  const s = spriteCache[key];
  if (s) { ctx.imageSmoothingEnabled = false; ctx.drawImage(s, player.x - 4, player.y - 8, 16, 32); }
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(player.x - 4, player.y + 22, 16, 4);
}

function drawHint() {
  const o = nearObj(), n = nearNPC();
  if (!o && !n) return;
  const raw = n ? `[E] TALK: ${n.name}` : `[E] ${o.lbl.split('\n')[0]}`;
  ctx.save();
  ctx.font = '6px "Press Start 2P",monospace';
  const tw = ctx.measureText(raw).width;
  const hx = Math.max(2, Math.min(CANVAS_W - tw - 14, player.x - tw / 2 - 3));
  const hy = player.y - 22;
  ctx.fillStyle = 'rgba(0,0,0,0.92)';
  ctx.fillRect(hx, hy, tw + 10, 12);
  ctx.strokeStyle = '#00ffcc';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(hx + .5, hy + .5, tw + 9, 11);
  ctx.fillStyle = '#00ffcc';
  ctx.fillText(raw, hx + 5, hy + 9);
  ctx.restore();
}

function drawLighting() {
  const h = Math.floor(gameState.time / 60) % 24;
  let dark = 0;
  if (h >= 22 || h < 5) dark = 0.6;
  else if (h >= 21) dark = 0.35;
  else if (h >= 20) dark = 0.2;
  else if (h < 6) dark = 0.18;
  else if (h < 7) dark = 0.08;
  if (dark > 0) { ctx.fillStyle = `rgba(0,0,20,${dark})`; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H); }
  if (h >= 6 && h < 8) { ctx.fillStyle = 'rgba(255,200,80,0.06)'; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H); }
}

// ── NEARBY ────────────────────────────────────────────────────────────
function nearObj() {
  for (const o of SCENE_OBJECTS[gameState.scene]) {
    const sw = o.spr ? spriteCache[o.spr]?.width || o.w : o.w;
    const sh = o.spr ? spriteCache[o.spr]?.height || o.h : o.h;
    if (player.x + 6 >= o.x - 12 && player.x <= o.x + sw + 12 && player.y + 8 >= o.y - 12 && player.y <= o.y + sh + 12) return o;
  }
  return null;
}

function nearNPC() {
  for (const n of gameState.npcs) {
    if (n.scene !== gameState.scene) continue;
    if (!isNPCUnlocked(n)) continue;
    if (Math.abs(player.x - n.x) < 24 && Math.abs(player.y - n.y) < 24) return n;
  }
  return null;
}

// ── INTERACT ───────────────────────────────────────────────────────────
function interact() {
  if (gameState.paused) return;
  const n = nearNPC();
  if (n) { talkNPC(n); return; }
  const o = nearObj();
  if (!o) return;
  const a = o.act;
  if (a === 'bed') {
    if (gameState.time < 18 * 60 && gameState.time >= 6 * 60) { log('Too early to sleep!', 'w'); return; }
    modal('SLEEP', 'Sleep until 6 AM tomorrow?\nEnergy will be restored.', ['Sleep (advance to next day)', 'Cancel'], i => { if (i === 0) doSleep(); });
  } else if (a === 'wardrobe') {
    if (!gameState.clothed) { gameState.clothed = true; log('You got dressed.', 'g'); }
    else modal('WARDROBE', 'Manage your clothing.', ['Remove clothes (risky outside!)', 'Cancel'], i => {
      if (i === 0) { gameState.clothed = false; log('Clothes removed. Stay inside!', 'w'); }
    });
  } else if (a === 'fridge') {
    const opts = [];
    if (gameState.inventory.bread > 0) opts.push(`Eat bread (${gameState.inventory.bread} left)  +40 hunger`);
    if (gameState.inventory.energy_drink > 0) opts.push(`Use energy drink (${gameState.inventory.energy_drink} left)  +50 energy`);
    opts.push('Buy bread  $4  +40 hunger', 'Cancel');
    modal('FRIDGE', 'What would you like?', opts, i => {
      if (opts[i]?.startsWith('Buy') && pay(4)) { gameState.hunger = cap(gameState.hunger + 40); log('Bought and ate bread.', 'g'); }
      else if (opts[i]?.startsWith('Eat') && gameState.inventory.bread > 0) { gameState.inventory.bread--; gameState.hunger = cap(gameState.hunger + 40); log('Ate bread from fridge.', 'g'); }
      else if (opts[i]?.startsWith('Use energy drink') && gameState.inventory.energy_drink > 0) { gameState.inventory.energy_drink--; gameState.energy = cap(gameState.energy + 50); log('Used energy drink! +50 energy.', 'g'); }
    });
  } else if (a === 'stove') {
    modal('STOVE', 'Cook a home meal?', ['Cook meal  +50 hunger  (15 min)', 'Cancel'], i => {
      if (i === 0) { gameState.time += 15; gameState.hunger = cap(gameState.hunger + 50); log('Cooked and ate a meal.', 'g'); }
    });
  } else if (a === 'table') {
    log('You sit down and rest your feet.');
  } else if (a === 'exit_home') {
    if (!gameState.clothed) { log('You must be dressed before going outside!', 'b'); return; }
    const opts = getTravelOpts();
    modal('LEAVE HOME', 'How will you travel?', opts.map(o => o.label), i => doTravel(opts[i], 'STREET', 108, 96));
  } else if (a === 'enter_home') {
    changeScene('HOME', 96, 120);
  } else if (a === 'enter_factory') {
    if (!gameState.clothed) { log('You cannot enter without clothing.', 'b'); return; }
    const opts = getTravelOpts();
    modal('GO TO FACTORY', 'Choose your travel method:', opts.map(o => o.label), i => doTravel(opts[i], 'FACTORY', 80, 170));
  } else if (a === 'exit_factory') {
    const undone = gameState.tasks.filter(t => !t).length;
    if (undone > 0 && !gameState.shiftDone) {
      modal('LEAVE EARLY?', `${undone} task(s) still unfinished.\nYou will be docked $${undone * 12}.`, ['Leave anyway  (-$' + undone * 12 + ')', 'Stay and finish tasks'], i => {
        if (i === 0) { gameState.money = Math.max(0, gameState.money - undone * 12); log(`Left early. Docked $${undone * 12}.`, 'b'); endShift(false); changeScene('STREET', 108, 96); }
      });
    } else { endShift(true); changeScene('STREET', 108, 96); }
  } else if (a === 'diner') {
    const chefNpc = getNPCById('chef');
    const hasDiscount = isPerkActive(chefNpc);
    const p1 = hasDiscount ? Math.floor(8 * 0.8) : 8;
    const p2 = hasDiscount ? Math.floor(3 * 0.8) : 3;
    const p3 = hasDiscount ? Math.floor(3 * 0.8) : 3;
    const discNote = hasDiscount ? "\nChef Bob's discount applied!" : '';
    modal('DINER', `Chef Bob's Diner${discNote}`, [`Full meal  $${p1}  +60 hunger`, `Snack  $${p2}  +25 hunger`, `Coffee  $${p3}  +30 energy`, 'Leave'], i => {
      if (i === 0 && pay(p1)) { gameState.hunger = cap(gameState.hunger + 60); log('Had a full meal at the diner.', 'g'); if (hasDiscount) log("Chef Bob's discount applied!", 'g'); }
      else if (i === 1 && pay(p2)) { gameState.hunger = cap(gameState.hunger + 25); log('Quick snack at the diner.', 'g'); if (hasDiscount) log("Chef Bob's discount applied!", 'g'); }
      else if (i === 2) {
        if (gameState.rep >= 2 && !gameState.freeCoffeeUsed) {
          gameState.freeCoffeeUsed = true;
          gameState.energy = cap(gameState.energy + 30);
          log('On the house! (Regular customer perk)', 'g');
          log('Coffee! Feeling energized.', 'g');
          if (hasDiscount) log("Chef Bob's discount applied!", 'g');
        } else if (pay(p3)) {
          gameState.energy = cap(gameState.energy + 30);
          log('Coffee! Feeling energized.', 'g');
          if (hasDiscount) log("Chef Bob's discount applied!", 'g');
        }
      }
    });
  } else if (a === 'shop') {
    doShop();
  } else if (a === 'town_hall') {
    modal('TOWN HALL', `Factory Level: ${gameState.factoryLv}   Town Level: ${gameState.townLv}\nFactory XP: ${gameState.factoryXP} / ${gameState.factoryLv * 100}\nReputation: ${repStr(gameState.rep)}  ${getRepTitle()}\nDisciplines on record: ${gameState.disciplines}`, ['Close'], []);
  } else if (a === 'park') {
    modal('PARK', 'Take a break.', ['Rest 30 min  +15 energy', 'Go for a walk  +10 min', 'Leave'], i => {
      if (i === 0) { gameState.time += 30; gameState.energy = cap(gameState.energy + 15); log('Rested at the park.', 'g'); }
      else if (i === 1) { gameState.time += 10; log('Nice walk through the park.', 'g'); }
    });
  } else if (a === 'library') {
    const mayaNpc = getNPCById('maya');
    const mayaBonus = isPerkActive(mayaNpc) ? 15 : 0;
    const studyLabel = `Study (30 min, +25 Factory XP${mayaBonus ? ' +15 bonus' : ''})`;
    modal('TOWN LIBRARY', 'Expand your knowledge.\nStudy to earn Factory XP.', [
      studyLabel,
      'Read for fun (15 min, +10 energy)',
      'Leave',
    ], i => {
      if (i === 0) {
        gameState.time += 30;
        gameState.factoryXP += 25;
        if (mayaBonus) {
          gameState.factoryXP += 15;
          log("Maya's recommendation: +15 bonus XP!", 'g');
        }
        log('You studied at the library.', 'g');
        checkFactoryLv();
      }
      else if (i === 1) { gameState.time += 15; gameState.energy = cap(gameState.energy + 10); log('You read for fun at the library.', 'g'); }
    });
  } else if (a === 'clinic') {
    const docNpc = getNPCById('doc');
    const checkupCost = isPerkActive(docNpc) ? 5 : 10;
    modal('TOWN CLINIC', 'Get patched up or grab a health boost.', [
      `Check-up  $${checkupCost}  (restore hunger + energy)`,
      'Buy vitamins  $8  (halve hunger drain today)',
      'Leave',
    ], i => {
      if (i === 0 && pay(checkupCost)) {
        gameState.hunger = 100; gameState.energy = 100;
        if (checkupCost === 5) log("Doc Chen's discount applied!", 'g');
        log('Check-up done! Hunger and energy fully restored.', 'g');
      }
      else if (i === 1 && pay(8)) { gameState.vitaminsToday = true; log('Vitamins taken! Hunger drain halved for today.', 'g'); }
    });
  } else if (a === 'market') {
    doMarket();
  } else if (a === 'community_center') {
    const attended = !!gameState.attendedEventToday;
    modal('COMMUNITY CENTER', 'The heart of the city.', [
      attended ? 'Event attended today  (come back tomorrow)' : 'Attend event  FREE  +1 rep  (once per day)',
      'Leave',
    ], i => {
      if (i === 0 && !attended) {
        gameState.attendedEventToday = true;
        gameState.rep = Math.min(5, gameState.rep + 1);
        log('You attended a community event! +1 rep.', 'g');
      } else if (i === 0 && attended) {
        log('You already attended an event today.', 'w');
      }
    });
  } else if (a === 'storage') {
    const inv = gameState.inventory;
    const storOpts = [];
    if (inv.energy_drink > 0) storOpts.push(`Use energy drink (${inv.energy_drink})  +50 energy`);
    storOpts.push('Close');
    const storDesc = `Bread: ${inv.bread || 0}   Energy Drink: ${inv.energy_drink || 0}\nScrap Metal: ${inv.scrapMetal || 0}   Wire: ${inv.wire || 0}   Circuit: ${inv.circuit || 0}\nUniform: ${inv.uniform ? 'Y' : 'N'}   Bike: ${inv.bike ? 'Y' : 'N'}   Bus Pass: ${inv.bus_pass ? 'Y' : 'N'}\nToolbelt: ${inv.toolbelt ? 'Y' : 'N'}   Thermos: ${inv.thermos ? 'Y' : 'N'}`;
    modal('STORAGE', storDesc, storOpts, i => {
      if (storOpts[i]?.startsWith('Use energy drink') && inv.energy_drink > 0) { inv.energy_drink--; gameState.energy = cap(gameState.energy + 50); log('Used energy drink! +50 energy.', 'g'); }
    });
  } else if (a === 'upgrade') {
    doUpgrade();
  } else if (a === 'craft') {
    doCraft();
  } else if (a === 'contracts') {
    doContractBoard();
  } else if (a === 'assign_tasks') {
    doAssignTasks();
  } else if (a && a.startsWith('task')) {
    const idx = o.taskIdx !== undefined ? o.taskIdx : +a.slice(4);
    if (gameState.tasks[idx]) { log('Already completed: ' + gameState.taskNames[idx]); return; }
    if (gameState.assignedTasks[idx] === 'otto') { log('Otto is already working on that task.', 'w'); return; }
    const task = getDailyTaskByIndex(idx);
    const energyCost = gameState.improvedTools ? Math.floor(task.energy * 0.9) : task.energy;
    modal(
      task.label,
      `${task.description}\nTime Cost: ${task.time} min\nEnergy Cost: ${energyCost}`,
      [`Do it (${task.time}min, -${energyCost}en)`, 'Not now'],
      i => {
        if (i !== 0) return;
        if (!completeTaskByIndex(idx, 'player')) return;
        const tasksDoneNow = gameState.tasks.filter(t => t).length;
        if (tasksDoneNow === 2) {
          const ottoNpc = getNPCById('otto');
          if (isPerkActive(ottoNpc) && Math.random() < 0.4) {
            const remIdx = gameState.tasks.map((t, ii) => !t ? ii : -1).filter(ii => ii >= 0 && gameState.assignedTasks[ii] !== 'otto');
            if (remIdx.length > 0) {
              completeTaskByIndex(remIdx[0], 'otto_perk');
              log(`Otto says: 'I got that one for you.' — ${gameState.taskNames[remIdx[0]]} ✓`, 'g');
            }
          }
        }
        handleDailyTaskCompletion();
      }
    );
  }
}

function getTravelOpts() {
  const out = gameState.travelOptions.filter(t => !t.requires || gameState.inventory[t.requires]);
  return out.length ? out : [gameState.travelOptions[0]];
}

function doTravel(opt, scene, px, py) {
  if (!opt) return;
  if (opt.cost > 0 && !pay(opt.cost)) { log('Not enough money for this travel option.', 'b'); return; }
  gameState.time += opt.time;
  changeScene(scene, px, py);
  if (scene === 'FACTORY' && !gameState.arrivedToday) {
    gameState.arrivedToday = true;
    if (gameState.time > 9 * 60) {
      const late = gameState.time - 9 * 60;
      const pen = 10 + Math.floor(late / 10) * 5;
      gameState.money = Math.max(0, gameState.money - pen);
      gameState.disciplines++;
      if (gameState.rep > 1) gameState.rep--;
      log(`LATE by ${late} min!  Disciplined.  -$${pen}  (Total: ${gameState.disciplines})`, 'b');
    } else log('Arrived on time! Complete the 3 morning tasks first.', 'g');
  }
}

function getCraftEnergy(c) {
  return gameState.inventory.toolbelt ? Math.floor(c.energy * 0.8) : c.energy;
}

function getMissingMats(c) {
  const missing = [];
  const inv = gameState.inventory;
  if (!c.mat) return missing;
  if (c.mat.scrapMetal && (inv.scrapMetal || 0) < c.mat.scrapMetal)
    missing.push(`${c.mat.scrapMetal - (inv.scrapMetal || 0)} more Scrap Metal`);
  if (c.mat.wire && (inv.wire || 0) < c.mat.wire)
    missing.push(`${c.mat.wire - (inv.wire || 0)} more Wire`);
  if (c.mat.circuit && (inv.circuit || 0) < c.mat.circuit)
    missing.push(`${c.mat.circuit - (inv.circuit || 0)} more Circuit`);
  return missing;
}

function matLabel(mat) {
  if (!mat) return '';
  return ' [' + Object.entries(mat).map(([k, v]) => `${v}x ${k === 'scrapMetal' ? 'Scrap' : k === 'wire' ? 'Wire' : 'Circuit'}`).join(', ') + ']';
}

function getCraftTime(c) {
  if (!gameState.newEquipment) return c.time;
  return Math.max(5, Math.floor(c.time * 0.9));
}

function doAssignTasks() {
  const assignedIdx = getAssignedTaskIndex('otto');
  const listLines = [0, 1, 2].map(idx => {
    const label = gameState.taskNames[idx];
    if (gameState.tasks[idx]) return `${label} — DONE`;
    if (gameState.assignedTasks[idx] === 'otto') return `${label} — IN PROGRESS (Otto)`;
    return `${label} — Assign to Otto`;
  });
  const opts = [];
  const choiceMap = [];
  for (let idx = 0; idx < 3; idx++) {
    if (!gameState.tasks[idx] && !gameState.assignedTasks[idx] && assignedIdx === -1) {
      opts.push(`Assign: ${gameState.taskNames[idx]}`);
      choiceMap.push(idx);
    }
  }
  opts.push('Close');
  modal('ASSIGN TASKS', listLines.join('\n'), opts, i => {
    if (i >= choiceMap.length) return;
    const ottoNpc = gameState.npcs.find(n => n.id === 'otto');
    if (!ottoNpc || (ottoNpc.friendship || 0) < 1) { log("Otto: 'Do it yourself.'", 'b'); return; }
    const taskIdx = choiceMap[i];
    gameState.assignedTasks = { 0: null, 1: null, 2: null };
    gameState.assignedTasks[taskIdx] = 'otto';
    const task = getDailyTaskByIndex(taskIdx);
    const speedMult = gameState.automationLine ? 1.5 : 2;
    gameState.ottoWorkTimer = Math.max(1, Math.ceil(task.time * speedMult));
    log('Otto is on it.', 'g');
  });
}

function doCraft() {
  if (!gameState.tasks.every(t => t)) { log('You must finish all 3 tasks before crafting!', 'w'); return; }
  const avail = gameState.craftItems.filter(c => gameState.fullProduction || c.minLv <= gameState.factoryLv);
  if (!avail.length) { log('No craft recipes available yet.', 'w'); return; }
  modal('CRAFT STATION', 'Choose what to make:', [...avail.map(c => {
    const e = getCraftEnergy(c);
    const t = getCraftTime(c);
    return `${c.label}  +$${c.pay}  (${t}min, -${e}en)${matLabel(c.mat)}`;
  }), 'DELIVER', 'Cancel'], i => {
    if (i === avail.length) { doContractBoard(); return; }
    if (i > avail.length) return;
    const c = avail[i];
    const e = getCraftEnergy(c);
    const t = getCraftTime(c);
    const missing = getMissingMats(c);
    if (missing.length) { log('Need: ' + missing.join(', '), 'b'); return; }
    if (gameState.energy < e) { log('Too tired to craft that right now.', 'w'); return; }
    if (c.mat) {
      if (c.mat.scrapMetal) gameState.inventory.scrapMetal -= c.mat.scrapMetal;
      if (c.mat.wire) gameState.inventory.wire -= c.mat.wire;
      if (c.mat.circuit) gameState.inventory.circuit -= c.mat.circuit;
    }
    gameState.time += t;
    gameState.energy = Math.max(0, gameState.energy - e);
    addMoney(c.pay);
    gameState.moneyEarnedToday = (gameState.moneyEarnedToday || 0) + c.pay;
    gameState.factoryXP += c.pay;
    gameState.craftedToday++;
    gameState.totalCrafted++;
    log(`Crafted: ${c.label}  +$${c.pay}`, 'g');
    deliverCraftToContracts(c.id);
    checkFactoryLv();
    checkQuest('productive_worker');
    checkQuest('master_crafter');
    checkQuest('momentum');
  });
}

// ── TOWN BUILDINGS ───────────────────────────────────────────────────
function applyTownBuildings() {
  const defs = [
    { lv: 2, x: 88,  y: 148, w: 64, h: 48, lbl: 'LIBRARY',         act: 'library',          col: '#1a2f7a' },
    { lv: 3, x: 160, y: 148, w: 56, h: 48, lbl: 'CLINIC',          act: 'clinic',           col: '#7a1a1a' },
    { lv: 4, x: 220, y: 148, w: 44, h: 48, lbl: 'MARKET',          act: 'market',           col: '#1a5a22' },
    { lv: 5, x: 88,  y: 60,  w: 48, h: 32, lbl: 'COMM.\nCENTER',   act: 'community_center', col: '#5a3300' },
  ];
  for (const def of defs) {
    if (gameState.townLv >= def.lv && !SCENE_OBJECTS['STREET'].find(o => o.act === def.act)) {
      SCENE_OBJECTS['STREET'].push(Object.assign({}, def));
    }
  }
  const hasBoard = SCENE_OBJECTS['STREET'].find(o => o.act === 'contracts');
  if (gameState.townLv >= 2 && !hasBoard) {
    SCENE_OBJECTS['STREET'].push({ x: 56, y: 60, w: 32, h: 32, lbl: 'CONTRACTS', act: 'contracts', col: '#2a1a4a' });
  }
}

function triggerTownLevelUp(newLv) {
  const info = TOWN_LEVELS[newLv - 1];
  log(`The town has grown to ${info.name}!`, 'w');
  applyTownBuildings();
  triggerStoryProgress();
  const unlockLine = info.unlocks ? `New building unlocked:\n${info.unlocks} added to STREET!` : '';
  modal(
    'TOWN GROWS!',
    `Town Level ${newLv}: ${info.name}${unlockLine ? '\n\n' + unlockLine : ''}\n\n${info.flavor}`,
    ['Celebrate!'],
    () => {}
  );
}

function doUpgrade() {
  const next = FACTORY_UPGRADES.find(u => u.level === gameState.factoryLv + 1);
  if (!next) { modal('UPGRADE STATION', 'Factory is already at maximum level.', ['Close'], () => {}); return; }
  const currentName = gameState.factoryLv === 1 ? 'Starter Line' : (FACTORY_UPGRADES.find(u => u.level === gameState.factoryLv)?.name || 'Factory');
  modal('UPGRADE STATION', `Current: Lv ${gameState.factoryLv} — ${currentName}\nNext: Lv ${next.level} — ${next.name}\n\n${next.description}\n\nXP: ${gameState.factoryXP} / ${gameState.factoryLv * 100}\nCost: $${next.cost}`, [`Upgrade — $${next.cost}`, 'Cancel'], i => {
    if (i === 0) {
      if (gameState.money < next.cost) { log('Not enough money to upgrade.', 'b'); return; }
      const oldTownLv = gameState.townLv;
      gameState.money -= next.cost;
      gameState.factoryLv++;
      gameState.factoryXP = 0;
      if (next.level >= 2) gameState.improvedTools = true;
      if (next.level >= 3) gameState.newEquipment = true;
      if (next.level >= 4) gameState.automationLine = true;
      if (next.level >= 5 && !gameState.fullProduction) {
        gameState.fullProduction = true;
        gameState.wage += 15;
        log(`Full Production! Base wage increased to $${gameState.wage}.`, 'g');
      }
      if (gameState.townLv < gameState.factoryLv) gameState.townLv = Math.min(gameState.factoryLv, 5);
      log(`Factory upgraded to Level ${gameState.factoryLv}! ${next.name} installed.`, 'g');
      checkQuest('upgrade_ready');
      checkQuest('full_factory');
      checkQuest('momentum');
      checkQuest('final_push');
      triggerStoryProgress();
      if (gameState.townLv > oldTownLv) triggerTownLevelUp(gameState.townLv);
      applyTownBuildings();
    }
  });
}

function doShop() {
  modal('GENERAL SHOP', 'What are you looking for?',
    ['Food & Consumables', 'Equipment', 'Materials', 'Gifts', 'Leave'],
    i => {
      if (i === 0) doShopFood();
      else if (i === 1) doShopEquip();
      else if (i === 2) doShopMaterials();
      else if (i === 3) doShopGifts();
    }
  );
}

function doShopFood() {
  const inv = gameState.inventory;
  const pillarDiscount = gameState.rep >= 4;
  const breadCost = applyPillarDiscount(4);
  const coffeeCost = applyPillarDiscount(3);
  const mealCost = applyPillarDiscount(8);
  const drinkCost = applyPillarDiscount(6);
  const desc = `Buy food and drinks:${pillarDiscount ? '\n(Pillar discount)' : ''}`;
  const items = [
    { label: `BREAD         $${breadCost}   +40 hunger  (have: ${inv.bread || 0})`, fn: () => { if (pay(breadCost)) { inv.bread = (inv.bread || 0) + 1; log('Bought bread. +40 hunger when eaten.', 'g'); } } },
    { label: `COFFEE        $${coffeeCost}   +30 energy (immediate)`, fn: () => { if (pay(coffeeCost)) { gameState.energy = cap(gameState.energy + 30); log('Drank coffee — energized!', 'g'); } } },
    { label: `HOT MEAL      $${mealCost}   +70 hunger +20 energy`, fn: () => { if (pay(mealCost)) { gameState.hunger = cap(gameState.hunger + 70); gameState.energy = cap(gameState.energy + 20); log('Had a hot meal. Feeling good!', 'g'); } } },
    { label: `ENERGY DRINK  $${drinkCost}   +50 energy  (have: ${inv.energy_drink || 0})`, fn: () => { if (pay(drinkCost)) { inv.energy_drink = (inv.energy_drink || 0) + 1; log('Bought energy drink. Use from inventory.', 'g'); } } },
  ];
  modal('FOOD & CONSUMABLES', desc, [...items.map(it => it.label), 'Back', 'Leave Shop'], i => {
    if (i < items.length) { items[i].fn(); doShopFood(); }
    else if (i === items.length) doShop();
  });
}

function doShopEquip() {
  const inv = gameState.inventory;
  const pillarDiscount = gameState.rep >= 4;
  const items = [
    { id: 'uniform',  label: `UNIFORM   $${applyPillarDiscount(20)}  +10% pay`,     cost: applyPillarDiscount(20) },
    { id: 'bike',     label: `BIKE      $${applyPillarDiscount(35)}  10min travel`,  cost: applyPillarDiscount(35) },
    { id: 'bus_pass', label: `BUS PASS  $${applyPillarDiscount(15)}  5min, $2/trip`, cost: applyPillarDiscount(15) },
    { id: 'toolbelt', label: `TOOLBELT  $${applyPillarDiscount(45)}  -20% craft energy`, cost: applyPillarDiscount(45) },
    { id: 'thermos',  label: `THERMOS   $${applyPillarDiscount(25)}  -15% energy drain`, cost: applyPillarDiscount(25) },
  ];
  modal('EQUIPMENT', `One-time purchases:${pillarDiscount ? '\n(Pillar discount)' : ''}`, [...items.map(it => it.label + (inv[it.id] ? '  \u2713 OWNED' : '')), 'Back', 'Leave Shop'], i => {
    if (i < items.length) {
      const it = items[i];
      if (inv[it.id]) { log('You already own: ' + it.id + '.', 'w'); }
      else if (pay(it.cost)) { inv[it.id] = 1; log('Purchased: ' + it.label + '.', 'g'); checkQuest('tooled_up'); }
      doShopEquip();
    } else if (i === items.length) doShop();
  });
}

function doShopMaterials() {
  const inv = gameState.inventory;
  const pillarDiscount = gameState.rep >= 4;
  const scrap1 = applyPillarDiscount(3);
  const scrap5 = applyPillarDiscount(15);
  const wire1 = applyPillarDiscount(5);
  const wire3 = applyPillarDiscount(15);
  const circuit1 = applyPillarDiscount(12);
  function buyMat(key, qty, cost) {
    if (pay(cost)) {
      inv[key] = (inv[key] || 0) + qty;
      gameState.materialsBought = (gameState.materialsBought || 0) + qty;
      log(`Bought ${qty}x ${key === 'scrapMetal' ? 'Scrap Metal' : key === 'wire' ? 'Wire' : 'Circuit'}.`, 'g');
      checkQuest('material_girl');
    }
    doShopMaterials();
  }
  const desc = `Scrap Metal: ${inv.scrapMetal || 0}   Wire: ${inv.wire || 0}   Circuit: ${inv.circuit || 0}`;
  modal('MATERIALS', `${desc}${pillarDiscount ? '\n(Pillar discount)' : ''}`, [
    `SCRAP METAL  $${scrap1}   (have: ${inv.scrapMetal || 0})  Buy 1`,
    `SCRAP METAL  $${scrap5}  Buy 5`,
    `WIRE         $${wire1}   (have: ${inv.wire || 0})  Buy 1`,
    `WIRE         $${wire3}  Buy 3`,
    `CIRCUIT      $${circuit1}  (have: ${inv.circuit || 0})  Buy 1`,
    'Back',
    'Leave Shop',
  ], i => {
    if (i === 0) buyMat('scrapMetal', 1, scrap1);
    else if (i === 1) buyMat('scrapMetal', 5, scrap5);
    else if (i === 2) buyMat('wire', 1, wire1);
    else if (i === 3) buyMat('wire', 3, wire3);
    else if (i === 4) buyMat('circuit', 1, circuit1);
    else if (i === 5) doShop();
  });
}

function doShopGifts() {
  const inv = gameState.inventory;
  const items = [
    { id: 'coffee_item', label: `COFFEE (GIFT)  $3   (have: ${inv.coffee_item || 0})`, cost: 3 },
    { id: 'bread',       label: `BREAD          $4   (have: ${inv.bread || 0})`, cost: 4 },
    { id: 'scrapMetal',  label: `SCRAP METAL    $3   (have: ${inv.scrapMetal || 0})`, cost: 3 },
  ];
  modal('GIFTS', 'Buy gifts for NPCs:\n(Bread & Scrap Metal also usable elsewhere)', [...items.map(it => it.label), 'Back', 'Leave Shop'], i => {
    if (i < items.length) {
      const it = items[i];
      if (pay(it.cost)) { inv[it.id] = (inv[it.id] || 0) + 1; log(`Bought: ${it.label.split('  ')[0].trim()}.`, 'g'); }
      doShopGifts();
    } else if (i === items.length) doShop();
  });
}

function doMarket() {
  const inv = gameState.inventory;
  const samNpc = getNPCById('sam');
  const samDiscount = isPerkActive(samNpc) ? 3 : 0;
  const scrapCost = Math.max(1, 25 - samDiscount);
  const wireCost = Math.max(1, 20 - samDiscount);
  const circuitCost = Math.max(1, 30 - samDiscount);
  const mealCost = 5;
  function buyBulk(key, qty, cost) {
    if (pay(cost)) {
      inv[key] = (inv[key] || 0) + qty;
      gameState.materialsBought = (gameState.materialsBought || 0) + qty;
      const label = key === 'scrapMetal' ? 'Scrap Metal' : key === 'wire' ? 'Wire' : 'Circuit';
      log(`Market: bought ${qty}x ${label} for $${cost}.`, 'g');
      if (samDiscount) log("Sam's deal: -$3!", 'g');
      checkQuest('material_girl');
    }
    doMarket();
  }
  modal('TOWN MARKET', `Better prices on bulk orders.${samDiscount ? "\nSam's deal: -$3!" : ''}`, [
    `Bulk Scrap Metal  x10  $${scrapCost}`,
    `Bulk Wire         x5   $${wireCost}`,
    `Bulk Circuit      x3   $${circuitCost}`,
    `Meal Deal  $${mealCost}  +60 hunger +15 energy`,
    'Leave',
  ], i => {
    if (i === 0) buyBulk('scrapMetal', 10, scrapCost);
    else if (i === 1) buyBulk('wire', 5, wireCost);
    else if (i === 2) buyBulk('circuit', 3, circuitCost);
    else if (i === 3 && pay(mealCost)) {
      gameState.hunger = cap(gameState.hunger + 60);
      gameState.energy = cap(gameState.energy + 15);
      log('Meal deal! +60 hunger, +15 energy.', 'g');
    }
  });
}

function talkNPC(n) {
  const storyLine = getStoryDialogue(n);
  const f = n.friendship || 0;
  const line = storyLine || (n.dialog ? n.dialog[Math.min(f, n.dialog.length - 1)] : '...');
  const hearts = '♥'.repeat(f) + '♡'.repeat(5 - f);
  const role = n.role || '';
  const perkDesc = n.perk
    ? (isPerkActive(n) ? `PERK ACTIVE \u2713: ${n.perk.description}` : `PERK (locked): ${n.perk.description}`)
    : '';
  const desc = `"${line}"\n\n${hearts}\n\n${perkDesc}`;
  const opts = ['Say hi'];
  if (f < 5) opts.push('Befriend (+1 friendship)');
  opts.push('Give a gift', 'Ask about the town', 'Goodbye');
  modal(`TALKING TO: ${n.name}  (${role})`, desc, opts, i => {
    const chosen = opts[i];
    if (chosen === 'Befriend (+1 friendship)') {
      applyFriendshipGain(n, 1, 'friendship');
      gameState.rep = Math.min(5, gameState.rep + 0.2);
      checkQuest('getting_to_know');
      checkQuest('town_friend');
      checkQuest('factory_crew');
    } else if (chosen === 'Give a gift') {
      doGiftNPC(n);
    } else if (chosen === 'Ask about the town') {
      const townFlavor = [
        "It's a quiet little town.",
        "Things are picking up around here.",
        "The factory's really growing!",
        "This place is becoming something special.",
        "Best town I've ever lived in!"
      ];
      const fl = townFlavor[Math.min((gameState.townLv || 1) - 1, townFlavor.length - 1)];
      log(`${n.name}: "${fl}"`, '');
    }
  });
}

function doGiftNPC(n) {
  if ((gameState.giftedToday || []).includes(n.id)) {
    log(`You already gave ${n.name} a gift today.`, 'w');
    return;
  }
  const inv = gameState.inventory;
  const catalog = [
    { id: 'bread', label: 'Bread' },
    { id: 'coffee_item', label: 'Coffee (gift)' },
    { id: 'scrapMetal', label: 'Scrap Metal' },
  ];
  const available = catalog.filter(g => (inv[g.id] || 0) > 0);
  if (!available.length) {
    log('You have nothing to give. Buy gifts at the shop!', 'w');
    return;
  }
  const favLabel = n.gift === 'bread' ? 'Bread' : n.gift === 'coffee_item' ? 'Coffee' : 'Scrap Metal';
  const opts = available.map(g => {
    const fav = g.id === n.gift ? ' \u2605 FAVORITE' : '';
    return `${g.label} (have: ${inv[g.id] || 0})${fav}`;
  });
  opts.push('Cancel');
  modal(`GIVE GIFT TO ${n.name}`, `${n.name}'s favorite: ${favLabel}`, opts, i => {
    if (i >= available.length) return;
    const gift = available[i];
    inv[gift.id]--;
    if (!gameState.giftedToday) gameState.giftedToday = [];
    gameState.giftedToday.push(n.id);
    gameState.totalGiftsGiven = (gameState.totalGiftsGiven || 0) + 1;
    if (gift.id === n.gift) {
      applyFriendshipGain(n, 2, 'gift');
      log(`${n.name} loved it!`, 'g');
    } else {
      applyFriendshipGain(n, 1, 'gift');
      log(`${n.name} appreciated the gift.`, 'g');
    }
    checkQuest('getting_to_know');
    checkQuest('town_friend');
    checkQuest('factory_crew');
    checkQuest('gift_giver');
  });
}

function doSleep() {
  const earned = gameState.moneyEarnedToday || 0;
  const crafted = gameState.craftedToday;
  const tasksDone = gameState.tasks.filter(t => t).length;
  const hungerAtSleep = Math.round(gameState.hunger);
  const energyAtSleep = Math.round(gameState.energy);
  const canPayRent = gameState.money >= 10;
  const netDay = canPayRent ? earned - 10 : earned;

  let flavor;
  if (tasksDone === 3 && crafted > 0) flavor = 'Productive day! Keep it up.';
  else if (tasksDone === 3) flavor = 'Solid shift. Try crafting tomorrow.';
  else if (gameState.money < 15) flavor = 'Tight budget. Buy materials\nbefore your next shift.';
  else flavor = 'Rough day. The factory needs you.';

  const desc = [
    `Money earned today: $${earned}`,
    `Items crafted:      ${crafted}`,
    `Rent paid: ${canPayRent ? '-$10' : '\u26a0 UNPAID'}`,
    `Net for the day:    $${netDay}`,
    `Hunger at sleep:    ${hungerAtSleep}%`,
    `Energy at sleep:    ${energyAtSleep}%`,
    ``,
    flavor,
  ].join('\n');

  modal(`DAY ${gameState.day} SUMMARY`, desc, ['Start New Day'], () => {
    if (canPayRent) {
      gameState.money -= 10;
      if (gameState.rentDebt > 0) { gameState.rentDebt = 0; }
      log('Rent paid: -$10.', 'g');
    } else {
      gameState.rentDebt = (gameState.rentDebt || 0) + 1;
      log('\u26a0 Couldn\'t pay rent \u2014 debt noted.', 'b');
      if (gameState.rentDebt >= 3) {
        log('\u26a0 3 days overdue \u2014 reputation hit!', 'b');
        gameState.rep = Math.max(0, gameState.rep - 1);
      }
    }
    if (gameState.money > 100) checkQuest('in_the_black');
    gameState.time = 6 * 60;
    gameState.energy = Math.min(100, gameState.energy + 65);
    gameState.dailyTasks = pickDailyTasks();
    gameState.tasks = [false, false, false];
    gameState.assignedTasks = { 0: null, 1: null, 2: null };
    gameState.ottoWorkTimer = 0;
    gameState.diversifiedToday = false;
    refreshDailyTaskUI();
    gameState.arrivedToday = false;
    gameState.shiftDone = false;
    gameState.craftedToday = 0;
    gameState.moneyEarnedToday = 0;
    gameState.dayOver = false;
    gameState._warnedLate = false;
    gameState.giftedToday = [];
    gameState.ritaWarnedToday = false;
    gameState.freeCoffeeUsed = false;
    gameState.vitaminsToday = false;
    gameState.attendedEventToday = false;
    updateContractsForNewDay();
    gameState.day++;
    gameState.hunger = Math.max(gameState.hunger - 10, 20);
    checkStoryDayStart();
    checkQuest('first_steps');
    checkQuest('town_rising');
    if (gameState.hunger < 30) log('You woke up hungry. Find food soon!', 'w');
    log(`Day ${gameState.day} begins \u2014 ${DAYS[(gameState.day - 1) % 7]}. Get to the factory by 9:00 AM!`, 'g');
    changeScene('HOME', 96, 120);
    saveGame();
  });
}

function endShift(complete) {
  if (gameState.shiftDone) return;
  gameState.shiftDone = true;
  const done = gameState.tasks.filter(t => t).length;
  let p = gameState.wage + (done === 3 ? 10 : 0) + gameState.craftedToday * 3;
  if (gameState.inventory.uniform) p = Math.round(p * 1.1);
  const vanceNpc = getNPCById('boss');
  if (isPerkActive(vanceNpc)) {
    p += 8;
    log('Vance bonus: +$8', 'g');
  }
  if (gameState.rep >= 3) {
    p += 5;
    log('Respected worker bonus: +$5', 'g');
  }
  addMoney(p);
  gameState.weeklyPay += p;
  gameState.moneyEarnedToday = (gameState.moneyEarnedToday || 0) + p;
  if (complete) log(`Shift complete. Earned $${p}  (tasks: ${done}/3, crafts: ${gameState.craftedToday}).`, 'g');
  checkFactoryLv();
}

function checkFactoryLv() {
  if (gameState.factoryXP >= gameState.factoryLv * 100 && gameState.factoryLv < 5) log('Factory ready to upgrade! Visit the Upgrade Station.', 'g');
}

function pay(amt) {
  if (gameState.money < amt) { log(`Need $${amt} — you only have $${gameState.money}.`, 'b'); return false; }
  gameState.money -= amt;
  return true;
}

function addMoney(amt) {
  if (amt <= 0) return;
  gameState.money += amt;
  gameState.totalEarned = (gameState.totalEarned || 0) + amt;
  checkQuest('final_push');
}

function cap(v, mx = 100) { return Math.min(mx, Math.max(0, v)); }
function repStr(r) { return '★'.repeat(Math.round(r)) + '☆'.repeat(5 - Math.round(r)); }
function getRepTier(r = gameState.rep) {
  return REPUTATION_TIERS.find(t => r >= t.min && r <= t.max) || REPUTATION_TIERS[0];
}
function getRepTitle(r = gameState.rep) { return getRepTier(r).title; }
function getNPCById(id) { return gameState.npcs.find(n => n.id === id); }
function isNPCUnlocked(n) { return !n.minTownLv || gameState.townLv >= n.minTownLv; }
function isPerkActive(npc) { return !!npc && (((npc.friendship || 0) >= 3) || gameState.rep >= 5); }
function applyPillarDiscount(price) {
  if (gameState.rep < 4) return price;
  return Math.max(1, Math.floor(price * 0.9));
}
function applyFriendshipGain(npc, amount, reason = 'friendship') {
  if (!npc || amount <= 0) return;
  const before = npc.friendship || 0;
  npc.friendship = Math.min(5, before + amount);
  const gained = (npc.friendship || 0) - before;
  if (gained <= 0) return;
  log(`+${gained} friendship with ${npc.name}.`, 'g');
  const spill = NPC_SPILLOVER[npc.id] || {};
  Object.entries(spill).forEach(([targetId, spillAmt]) => {
    const target = getNPCById(targetId);
    if (!target) return;
    const oldVal = target.friendship || 0;
    target.friendship = Math.min(5, oldVal + spillAmt);
    const delta = (target.friendship || 0) - oldVal;
    if (delta > 0) log(`${target.name} heard about your ${reason} with ${npc.name}. +${delta} friendship.`, 'g');
  });
}
function getStoryDaysLeft() {
  if (gameState.storyChapter < 1) return gameState.storyDayLimit || 0;
  return Math.max(0, (gameState.storyDayLimit || 0) - (gameState.day - (gameState.storyStartDay || gameState.day)));
}

function unlockQuest(id, autoComplete = false) {
  const q = (gameState.quests || []).find(qq => qq.id === id);
  if (!q || q.status === 'complete') return;
  if (q.status === 'locked') q.status = 'available';
  if (autoComplete) checkQuest(id);
}

function storyModal(title, desc, buttons, cb) {
  modal(title, desc, buttons, cb, { story: true });
}

function triggerStoryProgress() {
  if (gameState.storyChapter < 1) return;
  if (gameState.storyChapter < 2 && gameState.factoryLv >= 2) {
    gameState.storyChapter = 2;
    unlockQuest('momentum');
    storyModal('PROGRESS REPORT', "The Council got word of our upgrade. They're watching closely now.\nKeep pushing — we need to hit Level 5 before time runs out.\nThe town is counting on us.", ['On it'], () => {});
    return;
  }
  if (gameState.storyChapter < 3 && gameState.townLv >= 3) {
    gameState.storyChapter = 3;
    unlockQuest('town_rising');
    storyModal('FROM THE MAYOR', "The factory's growth has inspired the whole town.\nNew residents are arriving. New buildings are opening.\nFinish what you started — we're almost there.", ['Keep going'], () => {});
    return;
  }
  if (gameState.storyChapter < 4 && gameState.factoryLv >= 4) {
    gameState.storyChapter = 4;
    unlockQuest('final_push');
    storyModal('THE FINAL PUSH', "One more upgrade and we hit Full Production.\nThe Council deadline is close. Don't stop now —\nthe whole town is behind you.", ["Let's finish this"], () => {});
    return;
  }
  if (gameState.storyChapter < 5 && gameState.factoryLv >= 5) {
    gameState.storyChapter = 5;
    unlockQuest('legend');
    checkQuest('legend');
    log('VICTORY: Factory saved! The town lives on.', 'w');
    storyModal('FACTORY SAVED!', "Full Production achieved. The Town Council has lifted the closure notice.\nThe factory is thriving. The town is growing. And it's all because of you.\n\nMr. Vance: 'I knew I could count on you.'\n\nRita: 'This town has a future now!'\n\nOtto: 'Best crew I ever worked with.'", ['The story continues...'], () => {});
  }
}

function checkStoryDayStart() {
  if (gameState.day >= 2 && gameState.storyChapter === 0) {
    gameState.storyStartDay = gameState.day;
    gameState.storyDayLimit = 30;
    storyModal('URGENT MESSAGE', "The Town Council has given us 30 days to reach Full Production.\nIf we fail, the factory closes and the town falls apart.\nI need your best work. Don't let me down.", ['Understood'], () => {
      gameState.storyChapter = 1;
      unlockQuest('first_steps');
      log("Story: The factory's future is on the line!", 'w');
      triggerStoryProgress();
    });
    return;
  }
  if (gameState.storyChapter >= 1) unlockQuest('first_steps');
  if (gameState.storyChapter >= 1 && gameState.storyChapter < 5 && getStoryDaysLeft() <= 0) {
    storyModal('TIME\'S UP', "The factory failed to reach Full Production in time.\nThe Town Council has issued a closure warning.\n\nBut the town isn't giving up yet — you have 10 more days.", ['Keep fighting'], () => {
      gameState.storyDayLimit += 10;
    });
    return;
  }
  triggerStoryProgress();
}

function getStoryDialogue(npc) {
  if (!npc || gameState.storyChapter < 1 || gameState.storyChapter >= 5) return '';
  if (npc.id === 'boss' && (npc.friendship || 0) === 0) return `We have ${getStoryDaysLeft()} days left. Get to work.`;
  if (npc.id === 'rita' && gameState.storyChapter >= 2 && !gameState.storyFlags.ritaChapter2) {
    gameState.storyFlags.ritaChapter2 = true;
    return 'I heard the factory is growing! This town needed good news.';
  }
  if (npc.id === 'chef' && gameState.storyChapter >= 3 && !gameState.storyFlags.chefChapter3) {
    gameState.storyFlags.chefChapter3 = true;
    return 'More customers every day! Your factory is saving this town.';
  }
  if (npc.id === 'otto' && gameState.storyChapter >= 4 && !gameState.storyFlags.ottoChapter4) {
    gameState.storyFlags.ottoChapter4 = true;
    return "Almost there. I'll pull extra shifts if you need me.";
  }
  return '';
}

function refreshAvailableContracts(force = false) {
  if (gameState.day < (gameState.contractRefreshDay || 1) && !force) return;
  const pool = CONTRACT_TEMPLATES.filter(c => c.minFactoryLv <= gameState.factoryLv);
  const shuffled = pool.sort(() => Math.random() - 0.5).slice(0, 2);
  gameState.availableContracts = shuffled.map(t => ({ ...t, id: `offer_${Date.now()}_${Math.random().toString(16).slice(2, 7)}` }));
  gameState.contractRefreshDay = gameState.day + 3;
}

function acceptContract(offerIdx) {
  const activeCount = (gameState.contracts || []).filter(c => c.status === 'active').length;
  if (activeCount >= 2) { log('You can only manage 2 contracts at once.', 'w'); return; }
  const offer = gameState.availableContracts[offerIdx];
  if (!offer) return;
  gameState.contracts.push({
    id: `contract_${Date.now()}_${Math.random().toString(16).slice(2, 7)}`,
    title: offer.title,
    description: `${offer.title}: Deliver ${offer.qty} ${offer.item}(s).`,
    item: offer.item,
    qty: offer.qty,
    delivered: 0,
    reward: offer.reward,
    daysLeft: offer.days,
    status: 'active',
  });
  gameState.availableContracts.splice(offerIdx, 1);
  log(`Contract accepted: ${offer.title}.`, 'g');
}

function doContractBoard() {
  refreshAvailableContracts();
  const active = (gameState.contracts || []).filter(c => c.status === 'active');
  const lines = ['Active Contracts:'];
  if (!active.length) lines.push('None');
  active.forEach(c => lines.push(`${c.title}: ${c.delivered}/${c.qty} — ${c.daysLeft} day${c.daysLeft === 1 ? '' : 's'} left`));
  lines.push('', 'Available Orders:');
  if (!gameState.availableContracts.length) lines.push('No new offers yet.');
  const opts = gameState.availableContracts.map(c => `Accept: ${c.title} (${c.qty} ${c.item})  $${c.reward}  ${c.days}d`);
  opts.push('Close');
  modal('CONTRACT BOARD', lines.join('\n'), opts, i => {
    if (i >= gameState.availableContracts.length) return;
    acceptContract(i);
    doContractBoard();
  });
}

function deliverCraftToContracts(itemId) {
  const active = (gameState.contracts || []).filter(c => c.status === 'active' && c.item === itemId && c.delivered < c.qty);
  if (!active.length) return;
  const c = active[0];
  c.delivered++;
  if (c.delivered >= c.qty) {
    c.status = 'complete';
    addMoney(c.reward);
    gameState.contractsCompleted = (gameState.contractsCompleted || 0) + 1;
    gameState.contractStreak = (gameState.contractStreak || 0) + 1;
    if (c.daysLeft === 1) gameState.clutchContract = true;
    log(`CONTRACT COMPLETE: ${c.title} — +$${c.reward}!`, 'w');
    checkQuest('first_contract');
    checkQuest('contract_worker');
    checkQuest('under_pressure');
    checkQuest('on_schedule');
  }
}

function updateContractsForNewDay() {
  (gameState.contracts || []).forEach(c => {
    if (c.status !== 'active') return;
    c.daysLeft--;
    if (c.daysLeft <= 0 && c.delivered < c.qty) {
      c.status = 'failed';
      gameState.rep = Math.max(0, gameState.rep - 0.2);
      gameState.contractStreak = 0;
      log(`CONTRACT FAILED: ${c.title}. No payment.`, 'b');
      checkQuest('on_schedule');
    }
  });
  refreshAvailableContracts();
}

function changeScene(sc, px, py) { gameState.scene = sc; player.x = px; player.y = py; }

// ── PASSIVE ────────────────────────────────────────────────────────────
function passive() {
  passiveTick++;
  if (passiveTick < 200) return;
  passiveTick = 0;
  gameState.time++;
  const _hDrain = gameState.vitaminsToday ? 0.2 : 0.4;
  gameState.hunger = Math.max(0, gameState.hunger - _hDrain);
  const energyDrain = gameState.inventory.thermos ? 0.15 * 0.85 : 0.15;
  gameState.energy = Math.max(0, gameState.energy - energyDrain);
  if (gameState.ottoWorkTimer > 0) {
    gameState.ottoWorkTimer = Math.max(0, gameState.ottoWorkTimer - 1);
    if (gameState.ottoWorkTimer === 0) {
      const taskIdx = getAssignedTaskIndex('otto');
      if (taskIdx !== -1 && !gameState.tasks[taskIdx]) {
        completeTaskByIndex(taskIdx, 'otto');
        gameState.ottoTasksCompleted = (gameState.ottoTasksCompleted || 0) + 1;
        log('Otto finished: ' + gameState.taskNames[taskIdx], 'g');
        checkQuest('delegator');
        handleDailyTaskCompletion();
      }
      gameState.assignedTasks = { 0: null, 1: null, 2: null };
    }
  }
  if (gameState.scene === 'STREET' && !gameState.clothed) {
    log('POLICE ARREST! Public indecency — $30 fine, 1 hour detention.', 'b');
    gameState.money = Math.max(0, gameState.money - 30);
    gameState.time += 60;
    gameState.clothed = true;
    changeScene('HOME', 96, 120);
  }
  if (gameState.time >= 22 * 60 && !gameState.dayOver) { gameState.dayOver = true; log('It\'s 10 PM — you should sleep soon!', 'w'); }
  if (gameState.time >= 9 * 60 && !gameState.arrivedToday && !gameState.shiftDone && gameState.scene !== 'FACTORY' && !gameState._warnedLate) {
    gameState._warnedLate = true;
    log('⚠  It\'s 9 AM! Get to the factory NOW!', 'b');
  }
  // Update NPC scenes based on schedule (morning < 14:00, evening >= 14:00)
  const isMorning = gameState.time < 14 * 60;
  for (const n of gameState.npcs) {
    if (n.schedule) n.scene = isMorning ? n.schedule.morning : n.schedule.evening;
  }
  // Rita hunger warning (once per day)
  const ritaNpc = getNPCById('rita');
  if (isPerkActive(ritaNpc) && gameState.hunger < 30 && !gameState.ritaWarnedToday) {
    gameState.ritaWarnedToday = true;
    log("Rita: 'Hey, you look hungry! Grab something to eat.'", 'w');
  }
}

// ── MOVEMENT ────────────────────────────────────────────────────────────
const SPEED = 1.5;
function moveP() {
  if (gameState.paused) return;
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) { dx = -SPEED; player.facing = 3; }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) { dx = SPEED; player.facing = 1; }
  if (keys['ArrowUp'] || keys['w'] || keys['W']) { dy = -SPEED; player.facing = 0; }
  if (keys['ArrowDown'] || keys['s'] || keys['S']) { dy = SPEED; player.facing = 2; }
  player.moving = !!(dx || dy);
  if (player.moving) { player.ft++; if (player.ft > 3) { player.frame = (player.frame + 1) % 8; player.ft = 0; } }
  else player.frame = 0;
  const nx = Math.max(4, Math.min(CANVAS_W - 10, player.x + dx));
  const ny = Math.max(4, Math.min(CANVAS_H - 24, player.y + dy));
  let blocked = false;
  for (const o of SCENE_OBJECTS[gameState.scene]) {
    const sw = o.spr ? spriteCache[o.spr]?.width || o.w : o.w;
    const sh = o.spr ? spriteCache[o.spr]?.height || o.h : o.h;
    if (nx + 6 > o.x && nx < o.x + sw && ny + 16 > o.y && ny < o.y + sh) { blocked = true; break; }
  }
  for (const n of gameState.npcs) {
    if (n.scene !== gameState.scene) continue;
    if (!isNPCUnlocked(n)) continue;
    if (Math.abs(nx - n.x) < 14 && Math.abs(ny - n.y) < 16) { blocked = true; break; }
  }
  if (!blocked) { player.x = nx; player.y = ny; }
  passive();
}

// ── HUD ───────────────────────────────────────────────────────────────────
function formatTime(m) {
  const h = Math.floor(m / 60) % 24, mn = m % 60, ap = h >= 12 ? 'PM' : 'AM', hh = h % 12 || 12;
  return hh + ':' + (mn < 10 ? '0' : '') + mn + ' ' + ap;
}

function updateHUD() {
  document.getElementById('ht').textContent = formatTime(gameState.time);
  document.getElementById('hd').textContent = DAYS[(gameState.day - 1) % 7] + ' ' + gameState.day;
  const me = document.getElementById('hm');
  me.textContent = '$' + gameState.money;
  me.className = 'hv ' + (gameState.money < 10 ? 'd' : gameState.money < 30 ? 'w' : 'g');
  const hh = document.getElementById('hh');
  hh.textContent = Math.round(gameState.hunger) + '%';
  hh.className = 'hv ' + (gameState.hunger < 25 ? 'd' : gameState.hunger < 50 ? 'w' : '');
  const he = document.getElementById('he');
  he.textContent = Math.round(gameState.energy) + '%';
  he.className = 'hv ' + (gameState.energy < 25 ? 'd' : gameState.energy < 50 ? 'w' : '');
  const done = gameState.tasks.filter(t => t).length;
  const te = document.getElementById('htk');
  te.textContent = done + '/3';
  te.className = 'hv ' + (done === 3 ? 'g' : gameState.arrivedToday && gameState.time > 9 * 60 ? 'd' : '');
  document.getElementById('hfl').textContent = 'Lv ' + gameState.factoryLv;
  document.getElementById('htl').textContent = 'Lv ' + gameState.townLv;
  document.getElementById('sb-loc').textContent = '📍 ' + gameState.scene;
  document.getElementById('sb-rep').textContent = `Rep: ${repStr(gameState.rep)}  ${getRepTitle()}`;
  document.getElementById('sb-disc').textContent = 'Disciplines: ' + gameState.disciplines;
  const w = [];
  if (gameState.hunger < 30) w.push('⚠ HUNGRY');
  if (gameState.energy < 25) w.push('⚠ TIRED');
  if (!gameState.clothed) w.push('⚠ UNCLOTHED');
  const sw = document.getElementById('sb-warn');
  sw.textContent = w.join('   ');
  sw.className = w.length ? 'sb-warn' : '';
  const sbStory = document.getElementById('sb-story');
  sbStory.className = '';
  if (gameState.storyChapter >= 1 && gameState.storyChapter < 5) {
    const daysLeft = getStoryDaysLeft();
    sbStory.textContent = `📅 ${daysLeft} days left`;
    if (daysLeft <= 5) sbStory.className = 'sb-story-warn';
    else if (daysLeft <= 10) sbStory.className = 'sb-story-soon';
  } else if (gameState.storyChapter === 5) {
    sbStory.textContent = '🏆 Factory Saved!';
    sbStory.className = 'sb-story-win';
  } else {
    sbStory.textContent = '';
  }
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function modal(title, desc, choices, cb, opts = {}) {
  document.getElementById('mt').textContent = title;
  document.getElementById('md').textContent = desc;
  const box = document.getElementById('mbox');
  const mt = document.getElementById('mt');
  box.style.borderColor = opts.story ? '#ffd700' : '#00ffcc';
  mt.style.color = opts.story ? '#ffd700' : '#00ffcc';
  mt.style.textShadow = opts.story ? '0 0 8px #ffd70088' : '0 0 8px #00ffcc88';
  const ch = document.getElementById('mc');
  ch.innerHTML = '';
  choices.forEach((c, i) => {
    const b = document.createElement('button');
    b.className = 'mb';
    b.textContent = c;
    b.onclick = () => { closeModal(); if (cb) cb(i); };
    ch.appendChild(b);
  });
  document.getElementById('modal').style.display = 'flex';
  gameState.paused = true;
}

function closeModal() { document.getElementById('modal').style.display = 'none'; gameState.paused = false; }

// ── LOG ───────────────────────────────────────────────────────────────────
const logEl = document.getElementById('log');
function log(msg, t = '') {
  const d = document.createElement('div');
  d.className = 'll l' + t;
  d.textContent = '▶  ' + msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
  if (logEl.children.length > 30) logEl.removeChild(logEl.children[0]);
}

// ── QUESTS ────────────────────────────────────────────────────────────────
function checkQuest(questId) {
  const q = (gameState.quests || []).find(q => q.id === questId);
  if (!q || q.status === 'complete' || q.status === 'locked') return;
  let progress = 0;
  if (q.goal.type === 'tasks_completed') progress = gameState.tasks.filter(t => t).length;
  else if (q.goal.type === 'friends') progress = gameState.npcs.filter(n => (n.friendship || 0) >= 1).length;
  else if (q.goal.type === 'total_crafted') progress = gameState.totalCrafted;
  else if (q.goal.type === 'factory_level') progress = gameState.factoryLv;
  else if (q.goal.type === 'materials_bought') progress = gameState.materialsBought || 0;
  else if (q.goal.type === 'money_after_rent') progress = gameState.money > 100 ? 1 : 0;
  else if (q.goal.type === 'own_items') progress = (q.goal.items || []).every(id => gameState.inventory[id]) ? 1 : 0;
  else if (q.goal.type === 'any_friend_3') progress = gameState.npcs.some(n => (n.friendship || 0) >= 3) ? 1 : 0;
  else if (q.goal.type === 'total_gifts') progress = gameState.totalGiftsGiven || 0;
  else if (q.goal.type === 'tasks_diversified') progress = gameState.diversifiedToday ? 1 : 0;
  else if (q.goal.type === 'otto_tasks') progress = gameState.ottoTasksCompleted || 0;
  else if (q.goal.type === 'factory_crew') {
    const vq = gameState.npcs.find(n => n.id === 'boss');
    const oq = gameState.npcs.find(n => n.id === 'otto');
    progress = (vq && (vq.friendship || 0) >= 2 && oq && (oq.friendship || 0) >= 2) ? 1 : 0;
  } else if (q.goal.type === 'day_reached') progress = gameState.day;
  else if (q.goal.type === 'momentum') progress = (gameState.totalCrafted >= 10 && gameState.factoryLv >= 3) ? 1 : 0;
  else if (q.goal.type === 'town_rising') progress = (gameState.townLv >= 3 && gameState.npcs.filter(n => (n.friendship || 0) >= 1).length >= 3) ? 1 : 0;
  else if (q.goal.type === 'final_push') progress = (gameState.factoryLv >= 4 && (gameState.totalEarned || 0) >= 500) ? 1 : 0;
  else if (q.goal.type === 'contracts_completed') progress = gameState.contractsCompleted || 0;
  else if (q.goal.type === 'clutch_contract_done' || q.goal.type === 'clutch_contract') progress = gameState.clutchContract ? 1 : 0;
  else if (q.goal.type === 'contract_streak') progress = gameState.contractStreak || 0;
  q.progress = progress;
  if (progress >= q.goal.target) completeQuest(q);
}

function completeQuest(q) {
  q.status = 'complete';
  addMoney(q.reward.money);
  gameState.factoryXP += q.reward.xp;
  gameState.rep = Math.min(5, gameState.rep + q.reward.rep);
  log(`QUEST COMPLETE: ${q.title} — Reward: $${q.reward.money}`, 'w');
  triggerStoryProgress();
}

    b.style.cursor = 'default';

// ── INPUT ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((e.key === 'e' || e.key === 'E' || e.key === ' ') && !gameState.paused) { interact(); e.preventDefault(); }
  if (e.key === 'Escape' && gameState.paused) closeModal();
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => keys[e.key] = false);

// ── DPAD ────────────────────────────────────────────────────────────────
(() => {
  const btns = [
    { l: '↑', k: 'ArrowUp', x: 58, y: 0 },
    { l: '←', k: 'ArrowLeft', x: 0, y: 40 },
    { l: '↓', k: 'ArrowDown', x: 58, y: 40 },

  ];
  const dp = document.getElementById('dpad-el');
  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'db';
    btn.style.left = b.x + 'px';
    btn.style.top = b.y + 'px';
    btn.textContent = b.l;
    btn.addEventListener('touchstart', e => { keys[b.k] = true; if (b.k === 'e') interact(); e.preventDefault(); }, { passive: false });
    btn.addEventListener('touchend', e => { keys[b.k] = false; e.preventDefault(); }, { passive: false });
    btn.addEventListener('mousedown', () => keys[b.k] = true);
    btn.addEventListener('mouseup', () => keys[b.k] = false);
    dp.appendChild(btn);
  });
})();

gameState.dailyTasks = pickDailyTasks();

function loop() { moveP(); draw(); updateHUD(); requestAnimationFrame(loop); }
